name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: 1.66.0

      - name: Generate protobuf bindings
        run: |
          buf generate https://github.com/agynio/api.git#commit=6dcb04a7bdc5f46b3cb13bce95561b7bf3daceaf \
            --include-imports \
            --path proto/agynio/api/runners/v1 \
            --path proto/agynio/api/identity/v1 \
            --path proto/agynio/api/authorization/v1 \
            --path proto/agynio/api/ziti_management/v1

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...
