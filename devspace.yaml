version: v2beta1

vars:
  RUNNERS_NAMESPACE: platform
  DEV_IMAGE: ghcr.io/agynio/devcontainer-go:1
  E2E_IMAGE: ghcr.io/agynio/devcontainer-go:1

functions:
  disable_argocd_sync: |-
    if kubectl get application runners -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for runners..."
      kubectl patch application runners -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'runners' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application runners -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for runners..."
      kubectl patch application runners -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'runners' not found in argocd namespace."
    fi
  wait_for_runners_deployment: |-
    echo "Waiting for runners deployment to exist..."
    ELAPSED=0
    while ! kubectl get deployment runners -n ${RUNNERS_NAMESPACE} >/dev/null 2>&1; do
      sleep 5
      ELAPSED=$((ELAPSED + 5))
      if [ "$ELAPSED" -ge 300 ]; then
        echo "ERROR: runners deployment not found after 300s"
        exit 1
      fi
      echo "Still waiting for runners deployment... (${ELAPSED}s)"
    done
    echo "Runners deployment found."
  patch_deployment: |-
    echo "Patching runners deployment for DevSpace..."
    kubectl patch deployment runners -n ${RUNNERS_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          volumes:
            - name: data
              emptyDir: {}
          containers:
            - name: runners
              image: ghcr.io/agynio/devcontainer-go:1 # keep in sync with DEV_IMAGE
              workingDir: /opt/app/data
              command:
                - sh
                - -c
                - |
                  set -eu
                  elapsed=0
                  while [ ! -f /opt/app/data/go.mod ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 300 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  buf generate buf.build/agynio/api \
                    --include-imports \
                    --path agynio/api/runners/v1 \
                    --path agynio/api/identity/v1 \
                    --path agynio/api/authorization/v1
                  exec go run ./cmd/runners
              volumeMounts:
                - name: data
                  mountPath: /opt/app/data
              livenessProbe: null
              readinessProbe: null
              startupProbe: null
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"
  wait_for_runners: |-
    echo "Waiting for runners deployment to roll out..."
    kubectl rollout status deployment/runners \
      -n ${RUNNERS_NAMESPACE} --timeout=120s

    echo "Waiting for runners source sync and process start..."
    ELAPSED=0
    LABEL_SELECTOR="app.kubernetes.io/name=runners,app.kubernetes.io/instance=runners"
    until kubectl logs -n ${RUNNERS_NAMESPACE} -l "${LABEL_SELECTOR}" --tail=200 2>/dev/null | \
      grep -q "runners: ready"; do
      sleep 5
      ELAPSED=$((ELAPSED + 5))
      if [ "$ELAPSED" -ge 600 ]; then
        echo "ERROR: runners ready log not found within 600s" >&2
        echo "Diagnostic pod list:" >&2
        kubectl get pods -n ${RUNNERS_NAMESPACE} -l "${LABEL_SELECTOR}" -o wide >&2 || true
        echo "Diagnostic logs (tail 200):" >&2
        kubectl logs -n ${RUNNERS_NAMESPACE} -l "${LABEL_SELECTOR}" --tail=200 >&2 || true
        exit 1
      fi
      echo "  still waiting... (${ELAPSED}s)"
    done
    echo "Runners is running from source."

deployments:
  e2e-runner:
    namespace: ${RUNNERS_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        securityContext:
          runAsUser: 1000
          fsGroup: 1000
        containers:
          - image: ${E2E_IMAGE}
            env:
              - name: RUNNERS_ADDRESS
                value: "runners:50051"
            volumeMounts:
              - containerPath: /opt/app/data
                volume:
                  name: data
        volumes:
          - name: data
            emptyDir: {}
        labels:
          app.kubernetes.io/name: runners-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e -n ${DEVSPACE_NAMESPACE} $@
  deploy: |-
    devspace run-pipeline deploy -n ${DEVSPACE_NAMESPACE} $@
  restore-argocd: |-
    devspace run-pipeline restore-argocd -n ${DEVSPACE_NAMESPACE} $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      trap 'echo "Restoring ArgoCD sync..."; restore_argocd_sync' EXIT
      disable_argocd_sync
      wait_for_runners_deployment
      patch_deployment
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace runners
      else
        start_dev --disable-pod-replace runners
        sleep 10
        echo "Dev environment ready. Stopping dev session."
        stop_dev runners
      fi

  deploy:
    run: |-
      disable_argocd_sync
      wait_for_runners_deployment
      patch_deployment
      start_dev --disable-pod-replace runners-deploy
      wait_for_runners
      echo "Deploy complete. Runners is running from source."

  test-e2e:
    run: |-
      create_deployments e2e-runner
      start_dev e2e-runner-test
      echo "Sync complete. Running e2e tests..."
      exec_container \
        --label-selector "app.kubernetes.io/name=runners-e2e" \
        -n ${RUNNERS_NAMESPACE} \
        -- bash -c 'cd /opt/app/data && buf generate buf.build/agynio/api --include-imports --path agynio/api/runners/v1 --path agynio/api/identity/v1 --path agynio/api/authorization/v1 && go test -v -count=1 -tags e2e ./test/e2e/'
      EXIT_CODE=$?
      purge_deployments e2e-runner
      exit $EXIT_CODE

  restore-argocd:
    run: |-
      restore_argocd_sync

dev:
  runners:
    namespace: ${RUNNERS_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: runners
      app.kubernetes.io/instance: runners
    containers:
      runners:
        container: runners
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
        logs:
          enabled: true
          lastLines: 200

  e2e-runner:
    namespace: ${RUNNERS_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: runners-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - /.gen/
          - /tmp/

  runners-deploy:
    namespace: ${RUNNERS_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: runners
      app.kubernetes.io/instance: runners
    containers:
      runners:
        container: runners
        sync:
          - path: ./:/opt/app/data
            noWatch: true
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/

  e2e-runner-test:
    namespace: ${RUNNERS_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: runners-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        noWatch: true
        excludePaths:
          - .git/
          - .devspace/
          - /.gen/
          - /tmp/
